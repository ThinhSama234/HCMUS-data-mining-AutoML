name: Build & Push image

# Tầng 2: đóng gói console thành Docker image bất biến, lưu vào GHCR để Tầng 3 chỉ việc `pull`.
on:
  push:
    branches: [main]      # main đổi   → build + ĐẨY image :latest và :sha-xxxx
    tags: ["v*"]          # gắn v1.2.0 → build + đẩy image :1.2.0 (bản phát hành)
  pull_request:
    branches: [main]      # trên PR    → CHỈ build để kiểm Dockerfile, KHÔNG đẩy (xem `push:` bên dưới)

jobs:
  build:
    runs-on: ubuntu-latest          # runner amd64 → image amd64, khớp VPS amd64 (Tầng 3)
    permissions:
      contents: read
      packages: write               # 🔑 cấp cho GITHUB_TOKEN quyền ĐẨY lên GHCR
    steps:
      - uses: actions/checkout@v4

      # buildx với driver `docker-container` — BẮT BUỘC để cache `type=gha` hoạt động.
      # Driver `docker` mặc định KHÔNG export cache ra backend ngoài → chính là lỗi build vừa rồi.
      - uses: docker/setup-buildx-action@v3

      # Sinh nhãn (tags) + labels cho image một cách tự động.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thinhsama234/hcmus-data-mining-automl     # ⚠️ BẮT BUỘC chữ thường
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}      # :latest chỉ gắn trên main
            type=sha                                                # :sha-a1b2c3d (bất biến → rollback)
            type=semver,pattern={{version}}                         # tag v1.2.0 → image :1.2.0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}      # token tự sinh mỗi run — KHÔNG cần tạo secret

      - uses: docker/build-push-action@v6
        with:
          context: .                                           # build theo Dockerfile ở gốc repo (+ .dockerignore)
          push: ${{ github.event_name != 'pull_request' }}     # PR: build-only · main/tag: build + push
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                                 # tái dùng cache build giữa các lần
          cache-to: type=gha,mode=max                          # (pip install pandas/plotly… nặng → cache giúp nhanh)
